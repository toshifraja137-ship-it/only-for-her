<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            box-sizing: border-box;
            background-color: gray;
        }

        .content {
            max-width: 800px;
            width: 100%;
        }

        .image-card {
            position: relative;
            max-width: 100%;
            margin: 0 auto 1rem;
            overflow: hidden;
            border-radius: 16px;
        }

        .image-card img {
            display: block;
            width: 100%;
            height: auto;
        }

        .image-card .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 1.2rem 1.5rem 1rem;
            background: rgba(0, 0, 0, 0.35);
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.6);
        }

        .image-card .sad {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            cursor: pointer;
            border-radius: 10px;
        }

        .image-card .alone {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            cursor: pointer;
            border-radius: 10px;
        }

        .image-card p {
            margin: 0.2rem 0;
            color: white;
            font-size: 1rem;
        }

        .image-card h1 {
            margin: 0.2rem 0;
            color: white;
            font-size: 2rem;
        }

        #secretBtn {

            cursor: pointer;

            margin-top: 20px;

            color: pink;

            font-weight: bold;

        }

        @media (max-width: 480px) {
            .image-card h1 {
                font-size: 1.2rem;
            }

            .image-card p {
                font-size: 0.95rem;
            }

            .image-card .sad {
                font-size: 0.9rem;
                padding: 0.45rem 0.8rem;
                width: auto;
            }
        }
    </style>

</head>

<body>

    <div class="content">
        <div class="image-card">
            <img src="assets/8022105583061379.jpg" alt="photo">
            <div class="overlay">
                <h1>This is for you meri jaan💓</h1>

                <P>Click on the below button when you feel sad. 🫂</P>
                <button class="sad" onclick="window.location.href='sad.html'">Click here</button>

                <p>Click on the below button.</p>
                <br>
                <h2>When You Feel Alone 🫂🫠❤️.</h2>
                <button class="alone" onclick="window.location.href='alone.html'">Click here</button>

                <p id="secretBtn">

                    💌 Open Only If You Miss Me

                </p>

                <div id="secretMessage"></div>

            </div>


        </div>

</body>

<script src="script.js"></script>

</html>
